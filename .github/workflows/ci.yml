name: CI

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
      # // TODO: other folders
        working-directory: task3
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: task3/repo-stat/go.mod
          cache: true
          cache-dependency-path: task3/repo-stat/go.sum

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install tools
        run: make -C repo-stat tools

      - name: Check protobuf generation
        run: |
          make proto
          git diff --exit-code

      - name: Lint
        run: make lint

      - name: Unit
        run: make unit

  integration:
    runs-on: ubuntu-latest
    needs: lint-and-unit
    defaults:
      run:
        working-directory: task3
    steps:
      - uses: actions/checkout@v5

      - name: Integration tests
        run: make test
        env:
          CONTAINER_RUNTIME: docker