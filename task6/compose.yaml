services:
  api:
    image: api:latest
    build:
      context: repo-stat
      dockerfile: Dockerfile.api
    container_name: api
    restart: unless-stopped
    ports:
      - 28080:8080
    volumes:
      - ./repo-stat/api/config/config.yaml:/config.yaml
    environment:
      - LISTEN_ADDRESS=:8080
      - SUBSCRIBER_ADDRESS=subscriber:8080
      - PROCESSOR_ADDRESS=processor:8080
    depends_on:
      - subscriber
      - processor
      - subscriber-db
      - processor-db

  subscriber:
    image: subscriber:latest
    build:
      context: repo-stat
      dockerfile: Dockerfile.subscriber
    container_name: subscriber
    restart: unless-stopped
    ports:
      - 28081:8080
    volumes:
      - ./repo-stat/subscriber/config/config.yaml:/config.yaml
    environment:
      - LISTEN_ADDRESS=:8080
      - API_ADDRESS=api:8080
    depends_on:
      - subscriber-db

  processor:
    image: processor:latest
    build:
      context: repo-stat
      dockerfile: Dockerfile.processor
    container_name: processor
    restart: unless-stopped
    ports:
      - 28082:8080
    volumes:
      - ./repo-stat/processor/config/config.yaml:/config.yaml
    environment:
      - LISTEN_ADDRESS=:8080
      - COLLECTOR_ADDRESS=collector:8080
      - KAFKA_ADDRESS=kafka:9092
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      collector:
        condition: service_started
      processor-db:
        condition: service_started
  
  collector:
    image: collector:latest
    build:
      context: repo-stat
      dockerfile: Dockerfile.collector
    container_name: collector
    restart: unless-stopped
    ports:
      - 28083:8080
    volumes:
      - ./repo-stat/collector/config/config.yaml:/config.yaml
    environment:
      - LISTEN_ADDRESS=:8080
      - SUBSCRIBER_ADDRESS=subscriber:8080
      - KAFKA_ADDRESS=kafka:9092
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      subscriber:
        condition: service_started
  
  subscriber-db:
    image: postgres:16-alpine
    container_name: subscriber-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SUBSCRIBER_DB_NAME:-subscriber_db}
      POSTGRES_USER: ${SUBSCRIBER_DB_USER:-admin}
      POSTGRES_PASSWORD: ${SUBSCRIBER_DB_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - subscriber_data:/var/lib/postgresql/data
      - ./repo-stat/subscriber/migrations:/docker-entrypoint-initdb.d/
    
  processor-db:
    image: postgres:16-alpine
    container_name: processor-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PROCESSOR_DB_NAME:-processor_db}
      POSTGRES_USER: ${PROCESSOR_DB_USER:-admin}
      POSTGRES_PASSWORD: ${PROCESSOR_DB_PASSWORD:-password}
    ports:
      - "5433:5432"
    volumes:
      - processor_data:/var/lib/postgresql/data
      - ./repo-stat/processor/migrations:/docker-entrypoint-initdb.d/
    
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      CLUSTER_ID: 'SxrYbRVTSWOzLOAgdbngbg=='
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./repo-stat/kafka-init.sh:/kafka-init.sh
    entrypoint: ["bash", "/kafka-init.sh"]
    restart: "no"

  tests:
    image: tests:latest
    build:
      context: tests
    container_name: tests
    restart: "no"
    depends_on:
      - api
    entrypoint: [ "true" ]
  
volumes:
  subscriber_data:
  processor_data: