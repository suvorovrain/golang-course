basePath: /
definitions:
  domain.Repo:
    properties:
      created_at:
        type: string
      description:
        type: string
      forks_count:
        type: integer
      name:
        type: string
      stargazers_count:
        type: integer
    type: object
host: localhost:8080
info:
  contact: {}
  description: This is a sample server for getting GitHub repo info.
  title: GitHub Repo Info API
  version: "1.0"
paths:
  /repo:
    get:
      consumes:
      - application/json
      description: Get details about a GitHub repository by owner and name
      parameters:
      - description: Repository Owner
        in: query
        name: owner
        required: true
        type: string
      - description: Repository Name
        in: query
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Repo'
        "400":
          description: Bad Request
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Get repository info
      tags:
      - repository
swagger: "2.0"
